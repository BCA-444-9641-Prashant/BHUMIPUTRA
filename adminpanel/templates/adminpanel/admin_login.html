{% extends 'base.html' %}

{% block title %}Admin Login - BHUMIPUTRA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="auth-form fade-in">
            <div class="text-center mb-4">
                <i class="fas fa-user-shield fa-3x text-success mb-3"></i>
                <h2>Admin Login</h2>
                <p class="text-muted">Access admin dashboard</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                </div>
                
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
                
                <div class="text-center">
                    <a href="{% url 'login' %}" class="text-decoration-none">
                        <i class="fas fa-arrow-left me-1"></i>Back to User Login
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
