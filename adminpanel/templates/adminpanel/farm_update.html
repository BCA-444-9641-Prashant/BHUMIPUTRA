{% extends 'base.html' %}

{% block title %}Update Farm - Admin Panel{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-tractor me-2"></i>Update Farm</h1>
    <a href="{% url 'adminpanel:farm_monitoring' %}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back to Farm Monitoring
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-tractor me-2"></i>Edit Farm Information</h5>
            </div>
            <div class="card-body">
                <form method="post" class="needs-validation" novalidate>
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="farmer" class="form-label">Farmer</label>
                            <input type="text" class="form-control" id="farmer" value="{{ farm.farmer.username }}" readonly>
                            <small class="text-muted">Farmer cannot be changed</small>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="location" class="form-label">Farm Location *</label>
                            <input type="text" class="form-control" id="location" name="location" value="{{ farm.location }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="size" class="form-label">Farm Size (acres) *</label>
                            <input type="number" class="form-control" id="size" name="size" step="0.01" min="0" value="{{ farm.size }}" required>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="crop" class="form-label">Current Crop *</label>
                            <input type="text" class="form-control" id="crop" name="crop" value="{{ farm.crop }}" required>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="farm_status" class="form-label">Farm Status *</label>
                            <select class="form-select" id="farm_status" name="farm_status" required>
                                <option value="">Select Status</option>
                                <option value="Active" {% if farm.farm_status == 'Active' %}selected{% endif %}>Active</option>
                                <option value="Inactive" {% if farm.farm_status == 'Inactive' %}selected{% endif %}>Inactive</option>
                                <option value="Maintenance" {% if farm.farm_status == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="soil_type" class="form-label">Soil Type *</label>
                            <input type="text" class="form-control" id="soil_type" name="soil_type" value="{{ farm.soil_type }}" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="water_source" class="form-label">Water Source *</label>
                            <input type="text" class="form-control" id="water_source" name="water_source" value="{{ farm.water_source }}" required>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'farm_monitoring' %}" class="btn btn-secondary me-md-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Update Farm
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
