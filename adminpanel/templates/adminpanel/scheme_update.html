{% extends 'base.html' %}

{% block title %}Update Scheme - Admin Panel{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-bullhorn me-2"></i>Update Scheme</h1>
    <a href="{% url 'adminpanel:scheme_home' %}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-bullhorn me-2"></i>Edit Scheme Information</h5>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="title" class="form-label">Scheme Title *</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ scheme.title }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="subtitle" class="form-label">Subtitle *</label>
                        <input type="text" class="form-control" id="subtitle" name="subtitle" value="{{ scheme.subtitle }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description *</label>
                        <textarea class="form-control" id="description" name="description" rows="6" required>{{ scheme.description }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="photo" class="form-label">Scheme Photo</label>
                        <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
                        <div class="form-text">Upload a new image to replace the current one (optional)</div>
                        {% if scheme.photo %}
                            <div class="mt-2">
                                <p class="text-muted">Current image:</p>
                                <img src="{{ scheme.photo.url }}" class="img-thumbnail" style="max-width: 200px;">
                            </div>
                        {% endif %}
                        <img id="image-preview" class="mt-2" style="max-width: 200px; display: none;">
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'adminpanel:scheme_home' %}" class="btn btn-secondary me-md-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Update Scheme
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
